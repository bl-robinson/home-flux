apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: bdclark
spec:
  interval: 5m0s
  url: https://bdclark.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mosquitto
spec:
  interval: 10m
  timeout: 5m
  releaseName: mosquitto
  chart:
    spec:
      chart: mosquitto
      version: '0.6.1'
      sourceRef:
        kind: HelmRepository
        name: bdclark
  values:
    image:
      tag: "2.0.22"
    service:
      type: ClusterIP
      ports:
        mqtt:
          enabled: true
          port: 1883
          targetPort: 1883
          protocol: TCP
        websocket:
          enabled: true
          port: 9001
          targetPort: 9001
          protocol: TCP
        mqttTls:
          enabled: false
    config:
      allowAnonymous: false
      logLevel: information
    auth:
      secretRef:
        name: mosquitto-users
        key: passwd
    persistence:
      enabled: true
      existingClaim: mosquitto-pvc
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
