apiVersion: v1
kind: Service
metadata:
  name: mosquitto-lb
  annotations:
    metallb.universe.tf/loadBalancerIPs: 10.0.3.106,2a06:61c2:27ae:2::7
spec:
  selector:
    app.kubernetes.io/name: mosquitto
    app.kubernetes.io/instance: mosquitto
  type: LoadBalancer
  ipFamilyPolicy: RequireDualStack
  ipFamilies:
    - IPv4
    - IPv6
  externalTrafficPolicy: Cluster
  ports:
    - name: mqtt
      protocol: TCP
      port: 1883
      targetPort: 1883
    - name: websocket
      protocol: TCP
      port: 9001
      targetPort: 9001
