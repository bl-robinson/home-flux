apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: nginx-ingress
spec:
  infrastructure:
    annotations:
      metallb.universe.tf/loadBalancerIPs: 10.0.3.100
      service.cilium.io/external-traffic-policy: Local
  gatewayClassName: cilium
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
  - name: https
    port: 443
    protocol: TLS
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Passthrough

