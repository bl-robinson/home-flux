apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress-lb
  namespace: ingress
  annotations:
    metallb.universe.tf/loadBalancerIPs: 10.0.3.100
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local  # Preserves source IP!
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  - name: https
    port: 443
    targetPort: 443
    protocol: TCP
  selector:
    app.kubernetes.io/name: web