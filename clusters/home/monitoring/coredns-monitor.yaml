apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: coredns
  labels:
    k8s-app: kube-dns
spec:
  endpoints:
  - port: metrics
    interval: 15s
    metricRelabelings:
      - targetLabel: cluster
        replacement: home
  namespaceSelector:
    matchNames:
    - kube-system
  selector:
    matchLabels:
      k8s-app: kube-dns
