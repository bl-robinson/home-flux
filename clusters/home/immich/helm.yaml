apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: immich
spec:
  interval: 5m0s
  url: https://immich-app.github.io/immich-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 20m
  timeout: 20m
  chart:
    spec:
      chart: immich
      version: '0.10.3'
      sourceRef:
        kind: HelmRepository
        name: immich
  values:
    controllers:
      main:
        containers:
          main:
            image:
              tag: v2.3.1
            env:
              REDIS_HOSTNAME: immich-valkey
              DB_HOSTNAME: immich-postgres
              DB_USERNAME: immich
              DB_PASSWORD: immich
              DB_DATABASE_NAME: immich
    immich:
      metrics:
        enabled: true
      persistence:
        library:
          existingClaim: immich-pvc
    valkey:
      enabled: true
      persistence:
        data:
          enabled: true
          type: persistentVolumeClaim
          existingClaim: immich-redis-master-pvc
      controllers:
        main:
          containers:
            main:
              resources:
                limits:
                  cpu: 256m
                  memory: 512Mi
                requests:
                  cpu: 256m
                  memory: 512Mi
    server:
      controllers:
        main:
          containers:
            main:
              resources: # I run this WAY below the 'minimum spec' defined https://immich.app/docs/install/requirements/#hardware be aware when updating this frequently causes issues
                limits:
                  cpu: 2
                  memory: 2048Mi
                requests:
                  cpu: 512m
                  memory: 2048Mi
    machine-learning:
      controllers:
        main:
          containers:
            main:
              resources:
                limits:
                  cpu: 2
                  memory: 4096Mi
                requests:
                  cpu: 512m
                  memory: 2048Mi
  releaseName: immich
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
