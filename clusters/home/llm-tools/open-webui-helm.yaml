apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: open-webui
  namespace: llm-tools
spec:
  interval: 5m0s
  url: https://helm.openwebui.com/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
  namespace: llm-tools
spec:
  interval: 10m
  timeout: 5m
  releaseName: open-webui
  chart:
    spec:
      chart: open-webui
      sourceRef:
        kind: HelmRepository
        name: open-webui
  values:
    ollama:
      enabled: false
    pipelines:
      enabled: false
    persistence:
      enabled: true
      existingClaim: open-webui-data-pvc
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "1Gi"
    service:
      type: ClusterIP
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
