apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: open-webui-public
spec:
  hostnames:
  - open-webui.k8s.home.blrobinson.uk
  parentRefs:
  - name: gateway-ingress
    namespace: ingress
    sectionName: https
  rules:
  - backendRefs:
    - name: open-webui
      port: 80
