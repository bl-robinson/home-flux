apiVersion: logging.banzaicloud.io/v1beta1
kind: Logging
metadata:
  name: logging
spec:
  controlNamespace: logging
  fluentd:
    disablePvc: true
    resources:
      limits:
        memory: 512M
      requests:
        cpu: 200m
        memory: 512M
---
apiVersion: logging.banzaicloud.io/v1beta1
kind: FluentbitAgent
metadata:
  name: logging-agent
---
apiVersion: logging.banzaicloud.io/v1beta1
kind: ClusterFlow
metadata:
  name: clusterflow
spec:
  globalOutputRefs:
    - loki-output
  filters:
    - tag_normaliser: {}
  match:
    - select: {}
---
apiVersion: logging.banzaicloud.io/v1beta1
kind: ClusterOutput
metadata:
  name: loki-output
spec:
  loki:
    configure_kubernetes_labels: true
    url: http://loki-gateway.logging.svc.cluster.local
    buffer:
      timekey: 1m
      timekey_wait: 30s
      timekey_use_utc: true
